[General]
job_type = local
job_prefix = nextPolish
task = best
rewrite = yes
rerun = 4
parallel_jobs = 6
multithread_jobs = 128
genome = ./raw_assembly_again_nopostjoining/hap2.fa  #genome file
genome_size = 350m
workdir = ./nextpolish_raw_assembly_again_nopostjoining_hap2
polish_options = -p {multithread_jobs}

[sgs_option]
sgs_fofn = ./sgs.fofn
sgs_options = -max_depth 100 -bwatask = best
